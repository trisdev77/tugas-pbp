<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil - Ni Nyoman Trisnayanti</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; 
            font-family: 'Poppins', sans-serif; 
            background-color: #121212; 
            color: #ffffff; 
            display: flex; 
            min-height: 100vh;
        }
        
        /* Sidebar */
        .sidebar { 
            width: 280px; 
            background: #1a1a1a;
            padding: 40px 20px; 
            border-right: 2px solid #ffcc00; 
            height: 100vh;
            position: sticky;
            top: 0;
            display: flex;
            flex-direction: column;
        }

        .welcome-sidebar {
            text-align: center;
            margin-bottom: 50px;
        }

        .welcome-sidebar h2 {
            color: #ffcc00;
            font-size: 18px;
            letter-spacing: 1px;
            line-height: 1.4;
            text-transform: uppercase;
            margin: 0;
            border-bottom: 2px solid #ffcc00;
            padding-bottom: 15px;
        }

        .sidebar nav a { 
            display: block;
            color: #ffffff; 
            text-decoration: none; 
            padding: 15px 20px; 
            margin-bottom: 8px;
            font-size: 15px; 
            font-weight: 600; 
            transition: 0.3s;
            border-radius: 10px;
        }

        .sidebar nav a:hover { 
            background-color: #ffcc00; 
            color: #121212; 
            transform: translateX(5px);
        }

        .sidebar nav a.active {
            background-color: #ffcc00;
            color: #121212;
        }
        
        /* Main Content */
        .main-content { 
            flex-grow: 1; 
            padding: 40px; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start; 
        }

        .biodata-card { 
            background-color: #1e1e1e;
            border: 1px solid rgba(255, 204, 0, 0.3); 
            padding: 40px; 
            border-radius: 25px; 
            width: 100%; 
            max-width: 650px; 
            text-align: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .foto-profil { 
            width: 150px; 
            height: 150px; 
            border-radius: 50%; 
            border: 4px solid #ffcc00; 
            object-fit: cover; 
            margin-bottom: 25px;
        }

        .data-list { text-align: left; margin-bottom: 30px; }
        .data-item {
            display: flex;
            padding: 10px 0;
            border-bottom: 1px solid #333;
        }
        .label { color: #ffcc00; width: 130px; font-weight: bold; }
        .value { color: #fff; flex: 1; }

        /* Maps Wrapper */
        .map-wrapper { 
            margin-top: 20px; 
            border: 2px solid #ffcc00; 
            border-radius: 15px; 
            overflow: hidden; 
            height: 300px; 
            width: 100%;
        }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; position: relative; border-right: none; border-bottom: 2px solid #ffcc00; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="welcome-sidebar">
            <h2>Welcome To My Profile</h2>
        </div>
        <nav>
            <a href="index.html" class="active">HOME</a>
            <a href="pendidikan.html">PENDIDIKAN</a>
            <a href="skill.html">SKILL</a>
            <a href="form.html">FORM</a>
            <a href="kalkulator.html">KALKULATOR</a>
            <a href="layout.html">LAYOUT</a>
        </nav>
    </aside>

    <main class="main-content">
        <div class="biodata-card">
            <img src="foto.jpeg" alt="Ni Nyoman Trisnayanti" class="foto-profil">
            
            <div class="data-list">
                <div class="data-item">
                    <span class="label">NAMA</span>
                    <span class="value">: Ni Nyoman Trisnayanti</span>
                </div>
                <div class="data-item">
                    <span class="label">NIM</span>
                    <span class="value">: 2413231019</span>
                </div>
                <div class="data-item">
                    <span class="label">TGL LAHIR</span>
                    <span class="value">: 01 Oktober 2004</span>
                </div>
                <div class="data-item">
                    <span class="label">ALAMAT</span>
                    <span class="value">: Jl. Surapati, Sobangan, Kec. Mengwi, Badung</span>
                </div>
            </div>

            <div class="map-wrapper">
    <iframe 
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3945.385311905664!2d115.1705663!3d-8.5588923!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x2dd23bb09a25997d%3A0x6e9a65651c6e1e0a!2sJl.%20Surapati%2C%20Sobangan%2C%20Kec.%20Mengwi%2C%20Kabupaten%20Badung%2C%20Bali!5e0!3m2!1sid!2sid!4v1710500000000!5m2!1sid!2sid" 
        width="100%" 
        height="100%" 
        style="border:0;" 
        allowfullscreen="" 
        loading="lazy" 
        referrerpolicy="no-referrer-when-downgrade">
    </iframe>
</div>
        </div>
    </main>

</body>
</html>
